<!DOCTYPE html>
<html>
<head>
<title>Select Access</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to right, #4facfe, #00f2fe);
}

/* Navbar styles */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: #cfc7be; /* Light beige */
  display: flex;
  align-items: center;
  padding-left: 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  z-index: 1000;
}

.logo {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 1px;
  color: #000;
}

/* Push container below navbar */
.container {
  background:url("img4.jpeg");
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  text-align: center;
  width: 350px;
  margin-top: 80px; /* space for fixed navbar */
}

h2 {
  margin-bottom: 25px;
}

button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.user {
  background: #2ecc71;
  color: white;
}

.admin {
  background: #e74c3c;
  color: white;
}

.password-box {
  display: none;
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.login-btn {
  background: #185a9d;
  color: white;
  margin-top: 10px;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">📦 I FOUND</div>
</div>

<div class="container">
  <h2>Select Access</h2>
  <button class="user" onclick="goUser()">User</button>
  <button class="admin" onclick="showAdmin()">Admin</button>

  <div class="password-box" id="adminBox">
    <input type="password" id="adminPass" placeholder="Enter Admin Password">
    <button class="login-btn" onclick="checkPassword()">Login</button>
    <div class="error" id="errorMsg"></div>
  </div>
</div>

<script>
function goUser() {
  localStorage.removeItem("admin");
  window.location.href = "Project.html";
}

function showAdmin() {
  document.getElementById("adminBox").style.display = "block";
  document.getElementById("adminPass").focus();
}

function checkPassword() {
  let password = document.getElementById("adminPass").value;
  let correctPassword = "admin123";

  if (password === correctPassword) {
    localStorage.setItem("admin", "true");
    window.location.href = "Project.html";
  } else {
    document.getElementById("errorMsg").innerHTML = "Wrong password";
  }
}

// Clear error message when typing
document.getElementById("adminPass").addEventListener("input", function() {
  document.getElementById("errorMsg").innerHTML = "";
});

// Allow pressing Enter to submit password
document.getElementById("adminPass").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    checkPassword();
  }
});
</script>

</body>
</html>
