<!DOCTYPE html>
<html>
<head>
    <title>Report Found Item</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial;
        }

        body {
            background: linear-gradient(to right, #43cea2, #185a9d);
            padding-top: 80px;
        }

        .navbar {
            background: white;
            position: fixed;
            top: 0;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .navbar-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #185a9d;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #2193b0;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .hamburger span {
            height: 3px;
            width: 25px;
            background: #185a9d;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px,5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px,-5px);
        }

        @media(max-width:768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 60px;
                right: 0;
                background: white;
                width: 100%;
                max-height: 0;
                overflow: hidden;
                flex-direction: column;
                transition: max-height 0.3s ease;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            }

            .nav-links a {
                padding: 15px 20px;
                border-top: 1px solid #eee;
            }

            .nav-links.show {
                max-height: 300px;
            }
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, textarea {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px;
            background: #3cb043;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #2e8b3f;
        }

        .image-preview {
            margin-bottom: 12px;
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="navbar-container">
            <div class="logo">📦 I FOUND</div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="Project.html">Home</a>
                <a href="Gallery.html">Item Gallery</a>
                <a href="Lost.html">Lost Item</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>Report Found Item</h2>
        <form id="foundForm">
            <input type="text" id="itemName" placeholder="Item Name" required>
            <textarea id="description" placeholder="Description" required></textarea>
            <input type="date" id="dateFound" required>
            <input type="text" id="locationFound" placeholder="Location Found" required>
            <input type="text" id="submittedTo" placeholder="Submitted To" required>
            <input type="file" id="itemImage" accept="image/*">
            <img id="preview" class="image-preview" style="display:none;">
            <button type="submit">Submit</button>
        </form>
    </div>

    <script>

        const hamburger = document.getElementById("hamburger");
        const navLinks = document.getElementById("navLinks");
        hamburger.addEventListener("click", () => {
            navLinks.classList.toggle("show");
            hamburger.classList.toggle("active");
        });

        const preview = document.getElementById("preview");
        document.getElementById("itemImage").addEventListener("change", (e) => {
            if(e.target.files && e.target.files[0]){
                let reader = new FileReader();
                reader.onload = function(event){
                    preview.src = event.target.result;
                    preview.style.display = "block";
                }
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        document.getElementById("foundForm").addEventListener("submit", function(e){
            e.preventDefault();
            let name = itemName.value.trim();
            let desc = description.value.trim();
            let date = dateFound.value;
            let location = locationFound.value.trim();
            let submitted = submittedTo.value.trim();
            let imgData = preview.src || "";

            if(!name || !desc || !date || !location || !submitted){
                alert("All fields required!");
                return;
            }

            let item = { name, description: desc, date, location, submittedTo: submitted, image: imgData, status: "inventory" };
            let items = JSON.parse(localStorage.getItem("foundItems")) || [];
            items.push(item);
            localStorage.setItem("foundItems", JSON.stringify(items));

            alert("Item added successfully!");
            document.getElementById("foundForm").reset();
            preview.style.display = "none";
        });
    </script>

</body>
</html>
