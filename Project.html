<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Found - Lost & Found</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2e0249 0%, #570a57 50%, #a91079 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .logo { font-weight: bold; font-size: 22px; }

        .container {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 60px 100px;
        }

        .text h1 {
            font-size: 70px;
            line-height: 1.1;
        }

        .highlight { color: #ff41ed; }

        .text p {
            margin-top: 20px;
            font-size: 18px;
            color: #e0e0e0;
            max-width: 450px;
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 180px;
            height: 55px;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }

        .lost { background: #ff4b2b; }
        .found { background: #00d2ff; }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .image-section {
            width: 35%;
            display: flex;
            justify-content: flex-end;
        }

        .single-box {
            width: 400px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .single-box img {
            width: 110%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        footer {
            background: rgba(0, 0, 0, 0.2);
            padding: 30px 80px;
        }

        .copyright {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">📦 I FOUND</div>
        <div>
            <a href="Gallery.html" style="color: white; text-decoration: none;">Item Gallery</a>
        </div>
    </nav>

    <div class="container">
        <div class="text">
            <h1>Find &<br>Recover<br><span class="highlight">With Ease</span></h1>
            <p>Experience effortless recovery with our dedicated community-driven lost and found service.</p>

            <!-- ✅ UPDATED BUTTON LINKS -->
            <div class="buttons">
                <a href="Lost.html" class="btn lost">Lost Something</a>
                <a href="Found.html" class="btn found">Found Something</a>
            </div>
        </div>

        <div class="image-section">
            <div class="single-box">
                <img src="1.jpeg" alt="Recovered Item">
            </div>
        </div>
    </div>

    <footer>
        <h4>Contact Support</h4>
        <p>Mob.No.: +91 xxxxxxxxxx</p>
        <p>Email: help@ifound.com</p>
    </footer>

    <div class="copyright">
        &copy; 2026 I FOUND. All rights reserved.
    </div>

</body>
</html>
