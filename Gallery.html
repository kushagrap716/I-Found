<!DOCTYPE html><html>
<head>
    <title>Item Gallery</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }body {
        background: linear-gradient(to right, #2193b0, #6dd5ed);
        padding-top: 80px;
    }

    .navbar {
        background: white;
        position: fixed;
        top: 0;
        width: 100%;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        z-index: 1000;
    }

    .navbar-container {
        max-width: 1200px;
        margin: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
    }

    .logo {
        font-size: 22px;
        font-weight: bold;
        color: #185a9d;
    }

    .nav-links {
        display: flex;
        gap: 20px;
    }

    .nav-links a {
        text-decoration: none;
        color: #333;
    }

    .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
    }

    .hamburger span {
        height: 3px;
        width: 25px;
        background: #185a9d;
        border-radius: 2px;
        transition: all 0.3s;
    }

    @media (max-width: 768px) {
        .hamburger { display: flex; }
        .nav-links {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            width: 100%;
            max-height: 0;
            overflow: hidden;
            flex-direction: column;
            transition: max-height 0.3s ease;
        }
        .nav-links.show { max-height: 300px; }
    }

    .container {
        max-width: 1200px;
        margin: auto;
        padding: 20px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }

    @media (max-width: 992px) {
        .gallery { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
        .gallery { grid-template-columns: 1fr; }
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        position: relative;
    }

    .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
        cursor: pointer;
    }

    .card-footer {
        position: absolute;
        bottom: 15px;
        right: 15px;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .status {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1px solid #000;
    }

    .red { background: red; }
    .green { background: green; }

    .deleteBtn {
        width: 24px;
        height: 24px;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 50%;
        cursor: pointer;
    }

    .claim-info {
        margin-top: 10px;
        background: #f4f4f4;
        padding: 8px;
        border-radius: 6px;
        font-size: 13px;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        justify-content: center;
        align-items: center;
    }

    .modal img {
        max-width: 90%;
        max-height: 90%;
    }
</style>

</head>
<body><div class="navbar">
    <div class="navbar-container">
        <div class="logo">📦 I FOUND</div>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="Project.html">Home</a>
            <a href="Lost.html">Lost Item</a>
            <a href="Found.html">Found Item</a>
        </div>
    </div>
</div><div class="container">
    <h1 style="color:white; margin-bottom:30px;">Found Items Gallery</h1>
    <div class="gallery" id="gallery"></div>
</div><div class="modal" id="imageModal">
    <img id="modalImg">
</div><script>

const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("navLinks");
hamburger.addEventListener("click", () => {
    navLinks.classList.toggle("show");
});

// Strong admin check
const isAdmin = localStorage.getItem("admin") === "true";

const items = JSON.parse(localStorage.getItem("foundItems")) || [];
const gallery = document.getElementById("gallery");

items.forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    const imgHTML = item.image
        ? `<img src="${item.image}" onclick="openModal(this.src)">`
        : `<div style="height:150px;background:#ddd;border-radius:8px;">No Image</div>`;

    // Only admin sees claim info
    const claimDetails = (isAdmin && item.claimer)
        ? `<div class="claim-info">
            <b>Claimed By:</b> ${item.claimer.name}<br>
            <b>Mobile:</b> ${item.claimer.mobile}<br>
            <b>SAP No:</b> ${item.claimer.Sap}
        </div>`
        : "";

    // Only admin sees delete button
    const deleteBtnHTML = isAdmin
        ? `<button class="deleteBtn" onclick="deleteItem(${item.id})">✖</button>`
        : "";

    const statusClass = (item.status === "claimed") ? "green" : "red";

    card.innerHTML = `
        ${imgHTML}
        <h3>${item.name}</h3>
        <p>${item.description || "No description"}</p>
        <p><b>Location:</b> ${item.location}</p>
        <p><b>Date:</b> ${item.date}</p>
        ${claimDetails}
        <div class="card-footer">
            <div class="status ${statusClass}"></div>
            ${deleteBtnHTML}
        </div>
    `;

    gallery.appendChild(card);
});

function deleteItem(id) {
    if (!isAdmin) return;
    if (confirm("Delete this item?")) {
        let items = JSON.parse(localStorage.getItem("foundItems")) || [];
        items = items.filter(item => item.id !== id);
        localStorage.setItem("foundItems", JSON.stringify(items));
        location.reload();
    }
}

function openModal(src) {
    document.getElementById("imageModal").style.display = "flex";
    document.getElementById("modalImg").src = src;
}

document.getElementById("imageModal").addEventListener("click", () => {
    document.getElementById("imageModal").style.display = "none";
});

</script></body>
</html>
