<!DOCTYPE html>
<html>
<head>
    <title>Lost Item</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(to right,#f7971e,#ffd200);
            padding-top: 80px;
        }

        .navbar {
            background: white;
            position: fixed;
            top: 0;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .navbar-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #185a9d;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .hamburger span {
            height: 3px;
            width: 25px;
            background: #185a9d;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        @media (max-width:768px){
            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 60px;
                right: 0;
                background: white;
                width: 100%;
                max-height: 0;
                overflow: hidden;
                flex-direction: column;
                transition: max-height 0.3s ease;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            }

            .nav-links a {
                padding: 15px 20px;
                border-top: 1px solid #eee;
            }

            .nav-links.show {
                max-height: 300px;
            }
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2d5c17;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #c0392b;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 992px){
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px){
            .gallery {
                grid-template-columns: 1fr;
            }
        }

        .result-card {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .text-content {
            flex: 1;
        }

        .image-content {
            width: 150px;
            flex-shrink: 0;
        }

        .item-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }

        .no-img {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ddd;
            border-radius: 8px;
        }

        .no-result {
            color: red;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }

        .raise {
            background: #27ae60;
            margin-top: 10px;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        @media(max-width:600px){
            .result-card {
                flex-direction: column;
            }
            .image-content {
                width: 100%;
            }
        }

    </style>
</head>

<body>

    <div class="navbar">
        <div class="navbar-container">
            <div class="logo">📦 I FOUND</div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="Project.html">Home</a>
                <a href="Lost.html">Lost Item</a>
                <a href="Found.html">Found Item</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>Search Lost Item</h2>
        <form onsubmit="searchItem(event)">
            <input type="text" id="searchBox" placeholder="Enter item name">
            <button type="submit">Search</button>
        </form>

        <div class="gallery" id="results"></div>
    </div>

    <div class="modal" id="imageModal">
        <img id="modalImg">
    </div>

    <script>

        const hamburger = document.getElementById("hamburger");
        const navLinks = document.getElementById("navLinks");
        hamburger.addEventListener("click", () => {
            navLinks.classList.toggle("show");
            hamburger.classList.toggle("active");
        });

        function searchItem(event){
            event.preventDefault();
            const search = document.getElementById("searchBox").value.toLowerCase();
            const items = JSON.parse(localStorage.getItem("foundItems")) || [];
            const results = document.getElementById("results");
            results.innerHTML = "";
            let matchFound = false;

            items.forEach((item, index) => {
                if(item.status === "inventory" && item.name.toLowerCase().includes(search)){
                    matchFound = true;

                    const card = document.createElement("div");
                    card.className = "result-card";

                    const imageHTML = item.image 
                        ? `<img src="${item.image}" class="item-img" onclick="openModal(this.src)">` 
                        : `<div class="no-img">No Image</div>`;

                    card.innerHTML = `
                        <div class="text-content">
                            <h3>${item.name}</h3>
                            <p>${item.description || "No description provided."}</p>
                            <p><b>Location:</b> ${item.location}</p>
                            <p><b>Date:</b> ${item.date}</p>
                            <p><b>Submitted To:</b> ${item.submittedTo || "Not specified"}</p>
                            <button class="raise" onclick="raiseHand(${index})">✋ Raise Hand</button>
                        </div>
                        <div class="image-content">
                            ${imageHTML}
                        </div>
                    `;
                    results.appendChild(card);
                }
            });

            if(!matchFound){
                results.innerHTML = "<div class='no-result'>No matching item found</div>";
            }
        }

        function raiseHand(index){
            localStorage.setItem("claimItemIndex", index);
            window.location.href = "Claim.html";
        }

        function openModal(src){
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("modalImg");
            modal.style.display = "flex";
            modalImg.src = src;
        }

        document.getElementById("imageModal").addEventListener("click", function(){
            this.style.display = "none";
        });
    </script>
</body>
</html>
